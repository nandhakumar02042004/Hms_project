services:
  # Backend API (Node.js/Express)
  - type: web
    name: hms-backend
    runtime: node
    buildCommand: "cd server && npm install"
    startCommand: "cd server && node index.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: PORT
        value: 5000

  # Frontend (React Static)
  - type: static
    name: hms-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    publishDir: "frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: hms-backend
          property: host

databases:
  - name: hms-db
    plan: free # Use free tier for demo/tests
