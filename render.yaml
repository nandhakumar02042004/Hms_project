services:
  # Backend API (Django)
  - type: web
    name: hms-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn hms_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: hms_project.settings
      - key: ALLOWED_HOSTS
        value: "*"

  # Frontend (React)
  - type: static
    name: hms-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    publishDir: "frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: hms-backend
          property: host

databases:
  - name: hms-db
    plan: free # Use free tier for demo/tests
